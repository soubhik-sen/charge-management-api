name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: charge_management_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d charge_management_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AUTH_MODE: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/charge_management_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Migrate database
        run: alembic upgrade head
      - name: Run tests and produce reports
        run: python scripts/run_tests.py
      - name: Verify generated OpenAPI contract
        run: python scripts/export_openapi.py && git diff --exit-code -- app/contracts/charge-management-api.openapi.json
      - name: Build distribution
        run: python -m build
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: test-results/
          if-no-files-found: warn
